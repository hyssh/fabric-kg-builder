# CI — fabric-kg-builder
#
# Runs on every push and pull-request push.
# Gate: fast unit + contract tests must pass AND coverage ≥ 80%.
# slow/integration tests are NOT part of the merge gate (opt-in, see below).
# Smoke tests are excluded from the merge gate (they require a live env).

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests (slow, reads real sample PDFs)"
        type: boolean
        default: false

jobs:
  test:
    name: "pytest / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run fast tests with coverage gate
        # Runs unit + contract tests only (not slow, not integration).
        # Matches the default local `pytest` behaviour (addopts in pyproject.toml).
        # --cov-fail-under=80 enforces the SPEC-005 §9 coverage target.
        run: |
          pytest tests/unit tests/contract \
            -m "not slow and not integration" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Optional: integration tests (slow, real sample PDFs).
  # Triggered manually via workflow_dispatch, or when sample_data/ changes.
  # NOT a merge gate — failures here are informational only.
  # Run locally: pytest -m integration -v
  # ---------------------------------------------------------------------------
  integration:
    name: "integration tests (opt-in)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration == true
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        # Real-PDF tests skip gracefully if sample_data/ is absent.
        run: |
          pytest tests/unit tests/contract tests/integration \
            -m "integration or slow" \
            --tb=short -v

