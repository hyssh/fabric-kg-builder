        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: source_section

    - name: identifies
      description: "A table cell value or part number identifies a domain entity (Part or Component)"
      module: provenance
      sourceType: TableCell
      targetType: Part
      inversePolicy: none
      evidenceLink: true
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: identifies
        evidenceIdColumn: evidence_id

    # ── materialized inverses (IDs in 200x block) ─────────────────────────────
    # These inverse entries allow the compiler to register the inverse name in
    # ids.lock.json; they are not authored as forward relationships.

    - name: component_of
      description: "Inverse of has_component — a component belongs to a device (materialized inverse)"
      module: support-domain
      sourceType: Component
      targetType: Device
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: target_entity_id
        targetEntityIdColumn: source_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: has_component

    - name: part_of
      description: "Inverse of has_part — a part belongs to a component (materialized inverse)"
      module: support-domain
      sourceType: Part
      targetType: Component
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: target_entity_id
        targetEntityIdColumn: source_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: has_part

    - name: step_of
      description: "Inverse of has_step — a step belongs to a procedure (materialized inverse)"
      module: support-domain
      sourceType: Step
      targetType: Procedure
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: target_entity_id
        targetEntityIdColumn: source_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: has_step

    - name: shows
      description: "Alias inverse of shown_in — a figure or image shows a domain entity"
      module: visual-evidence
      sourceType: Figure
      targetType: Step
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: target_entity_id
        targetEntityIdColumn: source_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: shown_in

    - name: identified_by
      description: "Alias inverse of callout_identifies — a domain entity is identified by a callout"
      module: visual-evidence
      sourceType: Part
      targetType: Callout
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: target_entity_id
        targetEntityIdColumn: source_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: callout_identifies
