        typeFilterValue: has_callout

    - name: evidenced_by
      # BRIDGE RELATIONSHIP — Phase 1 traversal: domain entity → DocumentChunk → AI Search
      description: "A domain entity (Part, Component, Step, etc.) is evidenced by a document chunk or table cell; bridge hop to AI Search (yields chunk_id + related_entity_ids)"
