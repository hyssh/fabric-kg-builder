      targetType: DocumentChunk
      inversePolicy: none
      evidenceLink: true
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: evidenced_by
