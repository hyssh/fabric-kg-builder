      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: acts_on

    # ── document-evidence ─────────────────────────────────────────────────────

    - name: contains_section
      description: "A document contains a section"
      module: document-evidence
      sourceType: Document
      targetType: Section
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: contains_section

    - name: contains_table
      description: "A document contains an extracted table"
      module: document-evidence
      sourceType: Document
      targetType: Table
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: contains_table

    - name: contains_figure
      description: "A document contains an extracted figure"
      module: document-evidence
      sourceType: Document
      targetType: Figure
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
