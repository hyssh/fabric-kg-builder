        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: shown_in

    - name: stored_at
      description: "An image asset is stored at a Blob URL — expressed as blob_url property on the node, not a separate edge"
      module: visual-evidence
      sourceType: ImageAsset
      targetType: ImageAsset
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: visual_assets
        relationshipIdColumn: image_id
        sourceEntityIdColumn: image_id
        targetEntityIdColumn: image_id
        typeFilterColumn: asset_type
        typeFilterValue: ""

    - name: extracted_from
      description: "A visual region was extracted from a parent image asset (Document Intelligence)"
      module: visual-evidence
      sourceType: VisualRegion
      targetType: ImageAsset
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: extracted_from

    - name: callout_identifies
      description: "A callout label in a diagram points to and identifies a domain entity"
      module: visual-evidence
      sourceType: Callout
      targetType: Part
      inversePolicy: alias
      inverseName: identified_by
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: callout_identifies

    - name: located_in_region
      description: "A callout is located within a specific visual region (bounding box) in an image"
      module: visual-evidence
      sourceType: Callout
      targetType: VisualRegion
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: located_in_region

    - name: visually_depicts
      description: "An image asset visually depicts a domain entity (e.g. a diagram depicts a component)"
      module: visual-evidence
      sourceType: ImageAsset
      targetType: Component
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: visually_depicts

    - name: ocr_mentions
      description: "OCR text extracted from an image or region references a domain entity"
      module: visual-evidence
      sourceType: OCRText
      targetType: Part
      inversePolicy: none
      evidenceLink: false
      dataBinding:
        table: relationships
        relationshipIdColumn: relationship_id
        sourceEntityIdColumn: source_entity_id
        targetEntityIdColumn: target_entity_id
        typeFilterColumn: relationship_type
        typeFilterValue: ocr_mentions

    - name: image_evidences
      description: "An image asset is evidence for a claim or domain entity"
      module: visual-evidence
      sourceType: ImageAsset
      targetType: Part
      inversePolicy: none
      evidenceLink: false
      dataBinding:
