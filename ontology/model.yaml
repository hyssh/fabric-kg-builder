    # ── retrieval ─────────────────────────────────────────────────────────────

    - name: indexed_as
      # BRIDGE RELATIONSHIP — Phase 1 traversal hop 2: DocumentChunk → SearchIndexRecord → search_record_id
      description: "A document chunk has a corresponding record in an AI Search index; bridge hop (yields search_record_id + search_index_name for Phase 2 AI Search lookup)"
      module: retrieval
      sourceType: DocumentChunk
      targetType: SearchIndexRecord
